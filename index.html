<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mi Semana</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Semana">
<link rel="apple-touch-icon" href="icon-180v2.png">
<meta name="theme-color" content="#F2F2F7">

<style>
  :root{
    --bg:#F2F2F7; --card:#FFFFFF; --text:#1C1C1E; --secondary:#8A8A8E; --tertiary:#C7C7CC;
    --separator:#E5E5EA; --blue:#007AFF; --green:#34C759; --orange:#FF9500; --red:#FF3B30;
    --purple:#AF52DE; --teal:#30B0C7; --yellow:#FFCC00; --indigo:#5856D6; --pink:#FF2D55;
    --c-ingles: var(--orange); --c-poo: var(--blue); --c-intern: var(--teal); --c-nfl: var(--indigo);
    --c-run: var(--green); --c-burpees: #00A896; --c-med-am: var(--red); --c-med-pm: var(--pink);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", sans-serif;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{ font-family: var(--font); color: var(--text); font-size:15px; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width: 900px; margin: 0 auto; padding: 0 0 60px; }
  .navbar{ position: sticky; top:0; z-index: 20; background: rgba(242,242,247,0.85); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px); padding: 14px 20px 10px; }
  .navbar h1{ font-size: 30px; font-weight: 700; margin:0; letter-spacing: -0.02em; }
  .navbar .sub{ color: var(--secondary); font-size: 13px; margin: 2px 0 0; }
  .segmented{ display:flex; background: rgba(118,118,128,0.12); border-radius: 9px; padding: 2px; margin: 14px 20px 4px; }
  .segmented button{ flex:1; font-size: 13px; font-weight: 590; padding: 6px 10px; border:none; background: transparent;
    cursor:pointer; border-radius: 7px; color: var(--text); transition: all .2s ease; }
  .segmented button.active{ background:#fff; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .content{ padding: 12px 20px 0; }
  .group-label{ font-size: 12px; font-weight: 600; color: var(--secondary); text-transform: uppercase;
    letter-spacing: 0.02em; margin: 18px 4px 6px; }
  .card{ background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 1px rgba(0,0,0,0.02); }
  .cal-card{ padding: 4px 6px 10px; }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; padding: 10px 10px 4px; }
  .cal-head .month{ font-size: 17px; font-weight: 700; text-transform: capitalize; }
  .cal-nav{ display:flex; gap:4px; }
  .cal-nav button{ width:30px; height:30px; border-radius:50%; border:none; background: rgba(118,118,128,0.12);
    color: var(--blue); font-size: 16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .cal-dow{ display:grid; grid-template-columns: repeat(7,1fr); padding: 4px 6px 2px; }
  .cal-dow span{ font-size: 11px; color: var(--secondary); text-align:center; font-weight: 600; }
  .cal-days{ display:grid; grid-template-columns: repeat(7,1fr); row-gap: 2px; padding: 0 6px; }
  .cal-cell{ aspect-ratio: 1; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
  .cal-cell.empty{ cursor:default; }
  .cal-cell .num{ width: 34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius: 50%;
    font-size: 15px; font-weight: 500; color: var(--text); }
  .cal-cell.today .num{ color: var(--red); font-weight: 700; }
  .cal-cell.selected .num{ background: var(--blue); color:#fff; font-weight: 700; }
  .cal-cell .dot{ position:absolute; bottom: 2px; width:5px; height:5px; border-radius: 50%; background: transparent; }
  .today-link{ display:block; text-align:center; color: var(--blue); font-size: 14px; font-weight: 500;
    background:none; border:none; cursor:pointer; padding: 10px 0 2px; width:100%; }
  .row{ display:flex; align-items:flex-start; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--separator); }
  .row:last-child{ border-bottom: none; }
  .ios-check{ width: 23px; height:23px; border-radius:50%; border: 1.8px solid var(--tertiary); background: #fff;
    cursor:pointer; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; padding:0; }
  .ios-check svg{ width:13px; height:13px; opacity:0; }
  .ios-check.checked svg{ opacity:1; }
  .row-text{ flex:1; min-width:0; }
  .row-title{ font-size: 15.5px; font-weight: 500; display:flex; align-items:center; gap:7px; }
  .row-title .dot8{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .row.done .row-title{ color: var(--secondary); text-decoration: line-through; text-decoration-color: var(--tertiary); }
  .row-note{ width:100%; border:none; background:transparent; font-size: 13px; color: var(--secondary);
    outline:none; padding: 3px 0 0; font-family: var(--font); }
  .row-note::placeholder{ color: var(--tertiary); }
  .dd-summary{ display:flex; align-items:baseline; justify-content:space-between; padding: 4px 4px 0; margin-top: 4px; }
  .dd-summary .date-title{ font-size: 19px; font-weight: 700; text-transform: capitalize; }
  .dd-summary .count{ font-size: 12.5px; color: var(--secondary); }
  .day-rail{ display:flex; gap:6px; overflow-x:auto; padding: 2px 0 4px; }
  .day-pill{ font-size: 13px; font-weight: 500; padding: 6px 13px; border-radius: 15px; border: none;
    background: rgba(118,118,128,0.12); cursor:pointer; white-space:nowrap; color: var(--text); }
  .day-pill.active{ background: var(--blue); color:#fff; }
  .gblock{ display:grid; grid-template-columns: 82px 10px 1fr 24px; align-items:center; gap:10px;
    padding: 9px 14px; border-bottom: 1px solid var(--separator); }
  .gblock:last-child{ border-bottom: none; }
  .gblock input.time{ font-size:12.5px; border:none; background:transparent; outline:none; color: var(--secondary); font-variant-numeric: tabular-nums; }
  .gblock input.act{ width:100%; border:none; background:transparent; font-size:14.5px; outline:none; color: var(--text); }
  .cat-dot{ width:11px; height:11px; border-radius:50%; border:none; cursor:pointer; padding:0; }
  .del-btn{ background:none; border:none; color: var(--tertiary); cursor:pointer; font-size:18px; line-height:1; }
  .add-row-btn{ width:100%; text-align:left; padding: 12px 14px; border:none; background: transparent; color: var(--blue);
    font-size: 14.5px; cursor:pointer; font-weight: 500; }
  .cat-picker{ position:absolute; background:#fff; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.16);
    padding:8px; display:flex; gap:7px; z-index:10; flex-wrap:wrap; max-width:170px; }
  .cat-picker button{ width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer; }
  .cat-picker button.sel{ border-color: var(--text); }
  .status-bar{ text-align:center; font-size: 11.5px; color: var(--secondary); padding: 16px 0 0; min-height: 18px; }
  .status-bar.saving{ color: var(--blue); }
  .device-note{ text-align:center; font-size: 11px; color: var(--tertiary); padding: 4px 0 0; }
  @media (min-width: 760px){ .cal-layout{ display:grid; grid-template-columns: 340px 1fr; gap: 16px; align-items:start; } }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "mi-semana-app";
const DAYS_LABEL = {normal:"Días normales", finde:"Fin de semana"};
const SCHEDULE_KINDS = [{id:"normal", label:"Días normales"}, {id:"finde", label:"Fin de semana"}];
const CATS = [
  {id:"pro", label:"Profesional", color:"var(--indigo)"},
  {id:"eng", label:"Inglés", color:"var(--orange)"},
  {id:"intern", label:"Internships", color:"var(--teal)"},
  {id:"sport", label:"Deporte", color:"var(--green)"},
  {id:"meal", label:"Comida", color:"var(--pink)"},
  {id:"med", label:"Medicamento", color:"var(--red)"},
  {id:"rest", label:"Descanso", color:"var(--tertiary)"},
];
const catById = id => CATS.find(c=>c.id===id) || CATS[6];
const CHECK_ITEMS = [
  {id:"ingles",  label:"Inglés",              color:"var(--c-ingles)"},
  {id:"poo",     label:"POO",                 color:"var(--c-poo)"},
  {id:"intern",  label:"Internships",         color:"var(--c-intern)"},
  {id:"nfl",     label:"Proyecto NFL",        color:"var(--c-nfl)"},
  {id:"run",     label:"Correr 5km",          color:"var(--c-run)"},
  {id:"burpees", label:"Burpees",             color:"var(--c-burpees)"},
  {id:"med_am",  label:"Medicamento mañana",  color:"var(--c-med-am)"},
  {id:"med_pm",  label:"Medicamento noche",   color:"var(--c-med-pm)"},
];

function uid(){ return Math.random().toString(36).slice(2,9); }
function pad(n){ return n<10 ? "0"+n : ""+n; }
function isoDate(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function todayISO(){ const t=new Date(); return isoDate(t.getFullYear(), t.getMonth(), t.getDate()); }

function defaultWeekly(){
  const mk = (time, cat, activity) => ({id: uid(), time, cat, activity});
  return {
    normal: [
      mk("8:00-9:00","meal","Desayuno"), mk("9:00","med","Medicamento"), mk("9:00-10:30","pro","POO"),
      mk("10:30-11:00","rest","Descanso"), mk("11:00-1:00","eng","Inglés"),
      mk("13:00-14:00","meal","Almuerzo"), mk("14:00-15:30","intern","Internships - Assessments"),
      mk("15:30-17:30","sport","Correr 5km + Burpees + ducha"), mk("17:30-20:30","pro","NFL - Modelo predictivo"),
      mk("20:30-21:30","meal","Cena"), mk("21:30","med","Medicamento"),
      mk("21:30-23:00","pro","NFL - Modelo predictivo"),
    ],
    finde: [
      mk("8:00-9:00","meal","Desayuno"), mk("9:00","med","Medicamento"), mk("9:00-10:30","pro","POO"),
      mk("10:30-11:00","rest","Descanso"), mk("11:00-1:00","eng","Inglés"),
      mk("13:00-14:00","meal","Almuerzo"), mk("14:00-15:30","intern","Internships - Assessments"),
      mk("15:30-17:30","sport","Correr 5km + Burpees + ducha"), mk("17:30-20:30","pro","NFL - Modelo predictivo"),
      mk("20:30-21:30","meal","Cena"), mk("21:30","med","Medicamento"),
      mk("21:30-23:00","pro","NFL - Modelo predictivo"),
    ],
  };
}
function emptyChecklist(){ const items={}; CHECK_ITEMS.forEach(c=>items[c.id]={done:false,comment:""}); return {items}; }
function defaultState(){ return { weekly: defaultWeekly(), days: {} }; }

/* ============ localStorage-backed store ============ */
function useLocalStore(){
  const [state, setStateRaw] = useState(null);
  const [status, setStatus] = useState("");
  const timer = useRef(null);
  const stateRef = useRef(null);

  useEffect(() => {
    try{
      const raw = window.localStorage.getItem(STORAGE_KEY);
      const loaded = raw ? JSON.parse(raw) : defaultState();
      stateRef.current = loaded; setStateRaw(loaded);
    } catch(e){
      const fresh = defaultState(); stateRef.current = fresh; setStateRaw(fresh);
    }
  }, []);

  const saveNow = useCallback((data) => {
    setStatus("saving");
    try{
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setStatus("saved");
      setTimeout(()=>setStatus(s=>s==="saved"?"":s), 1200);
    } catch(e){
      setStatus("error: no se pudo guardar en este navegador");
    }
  }, []);

  const update = useCallback((updater, opts) => {
    const immediate = opts && opts.immediate;
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      stateRef.current = next;
      if (timer.current) clearTimeout(timer.current);
      if (immediate) saveNow(next);
      else timer.current = setTimeout(() => saveNow(stateRef.current), 400);
      return next;
    });
  }, [saveNow]);

  return [state, update, status];
}

/* ============ UI ============ */
function CatPicker({current, onPick, onClose}){
  const ref = useRef(null);
  useEffect(()=>{
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return ()=>document.removeEventListener("mousedown", h);
  },[]);
  return (
    <div className="cat-picker" ref={ref}>
      {CATS.map(c=>(<button key={c.id} className={c.id===current?"sel":""} style={{background:c.color}} title={c.label}
        onClick={()=>{ onPick(c.id); onClose(); }} />))}
    </div>
  );
}

function GeneralTab({weekly, onUpdate}){
  const [activeKind, setActiveKind] = useState("normal");
  const [pickerFor, setPickerFor] = useState(null);
  const blocks = weekly[activeKind] || [];
  const mutate = (nextBlocks, immediate) => onUpdate(prev => ({...prev, weekly: {...prev.weekly, [activeKind]: nextBlocks}}), {immediate});
  const changeBlock = (id, patch, immediate) => mutate(blocks.map(b=>b.id===id?{...b,...patch}:b), immediate);
  const deleteBlock = (id) => mutate(blocks.filter(b=>b.id!==id), true);
  const addBlock = () => mutate([...blocks, {id:uid(), time:"00:00-00:00", cat:"rest", activity:""}], true);

  return (
    <div>
      <div className="day-rail">
        {SCHEDULE_KINDS.map(k=>(<button key={k.id} className={"day-pill"+(k.id===activeKind?" active":"")} onClick={()=>setActiveKind(k.id)}>{k.label}</button>))}
      </div>
      <div className="group-label">{DAYS_LABEL[activeKind]}</div>
      <div className="card">
        {blocks.map(b=>{
          const cat = catById(b.cat);
          return (
            <div className="gblock" key={b.id}>
              <input className="time" value={b.time}
                onChange={e=>changeBlock(b.id,{time:e.target.value}, false)}
                onBlur={e=>changeBlock(b.id,{time:e.target.value}, true)}/>
              <div style={{position:"relative"}}>
                <button className="cat-dot" style={{background:cat.color}} onClick={()=>setPickerFor(pickerFor===b.id?null:b.id)} title={cat.label}/>
                {pickerFor===b.id && <CatPicker current={b.cat} onPick={(id)=>changeBlock(b.id,{cat:id}, true)} onClose={()=>setPickerFor(null)}/>}
              </div>
              <input className="act" value={b.activity} placeholder="Actividad..."
                onChange={e=>changeBlock(b.id,{activity:e.target.value}, false)}
                onBlur={e=>changeBlock(b.id,{activity:e.target.value}, true)}/>
              <button className="del-btn" onClick={()=>deleteBlock(b.id)}>×</button>
            </div>
          );
        })}
        <button className="add-row-btn" onClick={addBlock}>+ Añadir bloque</button>
      </div>
    </div>
  );
}

function CalendarTab({days, onUpdate}){
  const today = new Date();
  const [viewY, setViewY] = useState(today.getFullYear());
  const [viewM, setViewM] = useState(today.getMonth());
  const [selected, setSelected] = useState(todayISO());
  const monthLabel = new Date(viewY, viewM, 1).toLocaleDateString("es-ES", {month:"long", year:"numeric"});
  const firstDow = (new Date(viewY, viewM, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
  const cells = []; for (let i=0;i<firstDow;i++) cells.push(null); for (let d=1; d<=daysInMonth; d++) cells.push(d);
  const goPrev = () => { if (viewM===0){ setViewM(11); setViewY(viewY-1); } else setViewM(viewM-1); };
  const goNext = () => { if (viewM===11){ setViewM(0); setViewY(viewY+1); } else setViewM(viewM+1); };
  const goToday = () => { setViewY(today.getFullYear()); setViewM(today.getMonth()); setSelected(todayISO()); };
  const selData = days[selected] || emptyChecklist();
  const doneCount = CHECK_ITEMS.filter(c => selData.items[c.id]?.done).length;

  const updateItem = (itemId, patch, immediate) => {
    onUpdate(prev => {
      const cur = prev.days[selected] || emptyChecklist();
      const nextItems = {...cur.items, [itemId]: {...(cur.items[itemId]||{done:false,comment:""}), ...patch}};
      return {...prev, days: {...prev.days, [selected]: {items: nextItems}}};
    }, {immediate});
  };
  const selDate = new Date(selected + "T00:00:00");
  const selLabel = selDate.toLocaleDateString("es-ES", {weekday:"long", day:"numeric", month:"long"});

  return (
    <div className="cal-layout">
      <div>
        <div className="card cal-card">
          <div className="cal-head"><span className="month">{monthLabel}</span>
            <div className="cal-nav"><button onClick={goPrev}>‹</button><button onClick={goNext}>›</button></div>
          </div>
          <div className="cal-dow">{["L","M","X","J","V","S","D"].map(d=><span key={d}>{d}</span>)}</div>
          <div className="cal-days">
            {cells.map((d, i) => {
              if (d===null) return <div key={i} className="cal-cell empty"/>;
              const iso = isoDate(viewY, viewM, d);
              const isToday = iso === todayISO(); const isSel = iso === selected;
              const rec = days[iso];
              const doneN = rec ? CHECK_ITEMS.filter(c=>rec.items[c.id]?.done).length : 0;
              const dotColor = doneN===0 ? "transparent" : (doneN===8 ? "var(--green)" : "var(--orange)");
              return (
                <div key={i} className={"cal-cell"+(isToday?" today":"")+(isSel?" selected":"")} onClick={()=>setSelected(iso)}>
                  <span className="num">{d}</span><span className="dot" style={{background: dotColor}}/>
                </div>
              );
            })}
          </div>
          <button className="today-link" onClick={goToday}>Hoy</button>
        </div>
      </div>
      <div>
        <div className="dd-summary"><span className="date-title">{selLabel}</span><span className="count">{doneCount}/8</span></div>
        <div className="card" style={{marginTop:8}}>
          {CHECK_ITEMS.map(item => {
            const data = selData.items[item.id] || {done:false, comment:""};
            return (
              <div className={"row"+(data.done?" done":"")} key={item.id}>
                <button className={"ios-check"+(data.done?" checked":"")}
                  style={{borderColor: data.done? item.color : undefined, background: data.done? item.color : "#fff"}}
                  onClick={()=>updateItem(item.id, {done: !data.done}, true)}>
                  <svg viewBox="0 0 24 24" fill="none"><path d="M4 12l6 6L20 6" stroke="#fff" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <div className="row-text">
                  <div className="row-title"><span className="dot8" style={{background:item.color}}/>{item.label}</div>
                  <input className="row-note" placeholder="Añadir nota..." value={data.comment}
                    onChange={e=>updateItem(item.id, {comment:e.target.value}, false)}
                    onBlur={e=>updateItem(item.id, {comment:e.target.value}, true)}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [state, update, status] = useLocalStore();
  const [tab, setTab] = useState("cal");

  if (!state){
    return <div className="wrap"><p style={{padding:20, color:"var(--secondary)", fontSize:13}}>Cargando...</p></div>;
  }

  return (
    <div className="wrap">
      <div className="navbar">
        <h1>Mi Semana</h1>
        <p className="sub">Horario general + checklist diario</p>
        <div className="segmented">
          <button className={tab==="cal"?"active":""} onClick={()=>setTab("cal")}>Calendario</button>
          <button className={tab==="gen"?"active":""} onClick={()=>setTab("gen")}>Horario general</button>
        </div>
      </div>
      <div className="content">
        {tab==="gen" ? <GeneralTab weekly={state.weekly} onUpdate={update}/> : <CalendarTab days={state.days} onUpdate={update}/>}
        <div className={"status-bar"+(status==="saving"?" saving":"")}>
          {status === "saving" ? "Guardando..." : status === "saved" ? "✓ Guardado" : status.startsWith("error") ? status : ""}
        </div>
        <div className="device-note">Los datos se guardan solo en este dispositivo/navegador.</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);
</script>
</body>
</html>
